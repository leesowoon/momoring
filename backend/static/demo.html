<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momoring STS Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 760px; margin: 20px auto; padding: 0 12px; }
    .row { margin-bottom: 12px; }
    input, button, textarea { font-size: 14px; }
    #log { border: 1px solid #ddd; padding: 10px; min-height: 220px; white-space: pre-wrap; }
    #ttsPlayer { width: 100%; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Momoring Local Demo</h1>

  <div class="row">
    <button id="startBtn">1) Start Session</button>
    <span id="sessionInfo">session: -</span>
  </div>

  <div class="row">
    <button id="connectWsBtn">2) Connect WebSocket</button>
    <span id="wsInfo">ws: disconnected</span>
  </div>

  <div class="row">
    <label for="userText">3) Text fallback input</label><br />
    <textarea id="userText" rows="3" cols="80" placeholder="모모링에게 질문해보세요"></textarea><br />
    <button id="sendWsBtn">Send via WS (end_of_utterance)</button>
    <button id="sendHttpBtn">Send via HTTP (/v1/sts/respond + /v1/tts/speak)</button>
  </div>

  <div class="row">
    <strong>Log</strong>
    <div id="log"></div>
    <audio id="ttsPlayer" controls></audio>
  </div>

  <script>
    let sessionId = null;
    let ws = null;

    const log = (msg) => {
      const el = document.getElementById('log');
      el.textContent += `${new Date().toISOString()} | ${msg}\n`;
      el.scrollTop = el.scrollHeight;
    };

    document.getElementById('startBtn').onclick = async () => {
      const res = await fetch('/v1/sts/session/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ age_group: '10-12' }),
      });
      const data = await res.json();
      sessionId = data.session_id;
      document.getElementById('sessionInfo').textContent = `session: ${sessionId}`;
      log(`session started: ${sessionId}`);
    };

    document.getElementById('connectWsBtn').onclick = () => {
      if (!sessionId) {
        log('start session first');
        return;
      }
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}/v1/sts/stream`);
      ws.onopen = () => {
        document.getElementById('wsInfo').textContent = 'ws: connected';
        log('websocket connected');
      };
      ws.onclose = () => {
        document.getElementById('wsInfo').textContent = 'ws: closed';
        log('websocket closed');
      };
      ws.onmessage = (ev) => {
        const message = JSON.parse(ev.data);
        log(`ws <= ${JSON.stringify(message)}`);
        if (message.type === 'tts_ready' && message.audio_url) {
          const player = document.getElementById('ttsPlayer');
          player.src = message.audio_url;
          player.play().catch(() => {});
        }
      };
    };

    document.getElementById('sendWsBtn').onclick = () => {
      const text = document.getElementById('userText').value.trim();
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('websocket not connected');
        return;
      }
      if (!text) {
        log('text is empty');
        return;
      }

      ws.send(JSON.stringify({
        type: 'end_of_utterance',
        session_id: sessionId,
        text,
      }));
      log(`ws => end_of_utterance: ${text}`);
    };

    document.getElementById('sendHttpBtn').onclick = async () => {
      const text = document.getElementById('userText').value.trim();
      if (!sessionId) {
        log('start session first');
        return;
      }
      if (!text) {
        log('text is empty');
        return;
      }

      const respondRes = await fetch('/v1/sts/respond', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, text }),
      });
      const respond = await respondRes.json();
      log(`respond => ${JSON.stringify(respond)}`);

      const ttsRes = await fetch('/v1/tts/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, text: respond.text }),
      });
      const tts = await ttsRes.json();
      log(`tts => ${JSON.stringify(tts)}`);

      const player = document.getElementById('ttsPlayer');
      player.src = tts.audio_url;
      player.play().catch(() => {});
    };
  </script>
</body>
</html>
